name: OpenSidecar
options:
  createIntermediateGroups: true
# Swift Package Manager dependencies. Sparkle powers the macOS app's
# out-of-store auto-update (issue #52); it's an embedded open-source
# framework + CLI tooling, not a hosted service — the appcast feed and the
# DMG are served from infrastructure we already own (GitHub Pages + Releases).
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    # Pin the exact audited version. The generated Xcode project (including
    # Package.resolved) is intentionally ignored, so a range here would make
    # fresh clones and CI resolve different dependency code over time.
    exactVersion: "2.9.4"
schemes:
  OpenSidecarMac:
    build:
      targets:
        OpenSidecarMac: all
  OpenSidecarMacAudit:
    build:
      targets:
        OpenSidecarMac: all
        OpenSidecarMacAudit: [test]
    test:
      config: Debug
      targets:
        - OpenSidecarMacAudit
  OpenSidecariOS:
    build:
      targets:
        OpenSidecariOS: all
# DEVELOPMENT_TEAM comes from the environment (see generate.sh / .env) so no
# personal team ID lives in the repo. Unset = unsigned, fine for CI.
settings:
  base:
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    # Version defaults. The local release scripts (scripts/release-mac.sh /
    # scripts/release-ios.sh) override both via xcargs: MARKETING_VERSION from
    # the release tag, CURRENT_PROJECT_VERSION as a date-based build number
    # (YYYYMMDDHHMM — monotonic, keeps TestFlight builds unique).
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  OpenSidecarMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Mac
    dependencies:
      - package: Sparkle
    info:
      path: Mac/Info.plist
      properties:
        NSPrincipalClass: NSApplication
        CFBundleDisplayName: $(BUNDLE_DISPLAY_NAME)
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        NSLocalNetworkUsageDescription: PhotonPort connects to your iPad or iPhone over the local network in WiFi mode.
        # Bonjour service type must be declared for advertising/browsing.
        # Pairing reuses this same type (with a pair=1 TXT flag) so it needs
        # no separate declaration or Local Network authorization.
        NSBonjourServices: ["_photonport._tcp"]
        LSApplicationCategoryType: public.app-category.utilities
        NSAudioCaptureUsageDescription: PhotonPort forwards the Mac's sound to your iPad or iPhone while streaming.
        # --- Sparkle auto-update (re-armed for the fork's own appcast) ---
        # Feed + public EdDSA key point at the fork's self-hosted appcast on
        # GitHub Pages. AppDelegate.updateFeedConfigured detects SUFeedURL and
        # boots the updater; scheduled checks run via SUEnableAutomaticChecks.
        # Public half of the Sparkle EdDSA update key. The private key remains
        # in the release operator's Keychain and offline backup.
        SUFeedURL: https://lotgood.github.io/photonport/appcast.xml
        SUPublicEDKey: OgeM+zwZUrTx+CbaioTG9E7oM0ufYVcnS5sQRqTriiw=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.hyupji.photonport.mac
        PRODUCT_NAME: PhotonPort
        BUNDLE_DISPLAY_NAME: PhotonPort
        SWIFT_OBJC_BRIDGING_HEADER: Mac/OpenSidecarMac-Bridging-Header.h
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Mac/OpenSidecarMac.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Local dev builds get their own identity: TCC keys permission
        # grants by bundle ID + code signature, so a Debug build sharing
        # the release bundle ID knocks out the release app's Screen
        # Recording/Accessibility grants every time the binary changes.
        # The distinct display name keeps the two telling apart in the
        # System Settings permission lists.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: dev.hyupji.photonport.mac.debug
          BUNDLE_DISPLAY_NAME: PhotonPort Dev
  OpenSidecarMacAudit:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/Audit/Mac
    dependencies:
      - target: OpenSidecarMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.hyupji.photonport.mac.audit
        CODE_SIGNING_ALLOWED: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PhotonPort.app/Contents/MacOS/PhotonPort"
        BUNDLE_LOADER: "$(TEST_HOST)"
  OpenSidecariOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - iOS
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: PhotonPort
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # This asserts an export-compliance exemption, not an absence of
        # cryptography. PhotonPort uses CryptoKit + TLS-PSK; complete and record
        # the Mac+iOS export-classification review before either distribution
        # (docs/RELEASE.md).
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        # ProMotion: without this key iPhones cap app-driven layer updates at
        # 60Hz — required for the negotiated 120Hz stream to reach the glass.
        # iPads honor high refresh without it. (Apple: "Optimizing ProMotion
        # refresh rates for iPhone 13 Pro and iPad Pro".)
        CADisableMinimumFrameDurationOnPhone: true
        NSLocalNetworkUsageDescription: PhotonPort advertises itself on the local network so your Mac can connect over WiFi.
        NSBonjourServices: ["_photonport._tcp"]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.hyupji.photonport.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
