# Unsigned build verification for both targets, plus the protocol-contract,
# evidence-chain, and adversarial-harness suites. This fork ships no binaries
# from CI; the jobs catch compile regressions — especially cheap insurance for
# a codebase that leans on private APIs and OS-version-gated fallback paths —
# and protocol/security-contract regressions that local runs might skip.
#
# No signing: DEVELOPMENT_TEAM stays unset (no .env in CI), which project.yml
# documents as the supported unsigned configuration, and CODE_SIGNING_ALLOWED=NO
# skips the codesign step entirely.
name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Scan full history for secrets
        run: |
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/gitleaks.tar.gz" \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  $RUNNER_TEMP/gitleaks.tar.gz" \
            | sha256sum --check
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" git --redact --no-banner --no-color .

  pairing-vectors:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install XcodeGen
        run: |
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/xcodegen.zip" \
            https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip
          echo "090ec29491aad50aec10631bf6e62253fed733c50f3aab0f5ffc86bc170bdbef  $RUNNER_TEMP/xcodegen.zip" \
            | shasum -a 256 --check
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/xcodegen/bin" >> "$GITHUB_PATH"
      # test_mac_protocol_contract reads the generated project.pbxproj
      # (gitignored XcodeGen output), so generate before the suite runs.
      - name: Generate project
        run: ./generate.sh
      - name: Verify Mac/iOS pairing parity
        run: ./scripts/test-pairing-vectors.sh
      - name: Verify session ownership and replay state
        run: ./scripts/test-session-binding.sh
      - name: Verify protocol contract, evidence chain, and release gates
        run: python3 -m unittest discover -s Tests -p 'test_*.py' -v
      - name: Adversarial Mac protocol harness
        run: ./scripts/test-mac-protocol-adversarial.sh

  pages-appcast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Verify Pages appcast event matrix
        run: python3 -m unittest Tests/test_pages_appcast.py

  build:
    # macos-26 for the iOS 26 SDK (same reason upstream's release workflow
    # pins it — see upstream 0.6.7).
    runs-on: macos-26
    timeout-minutes: 30
    needs: [secrets, pairing-vectors, pages-appcast]
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: OpenSidecarMac
            destination: platform=macOS
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install XcodeGen
        run: |
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/xcodegen.zip" \
            https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip
          echo "090ec29491aad50aec10631bf6e62253fed733c50f3aab0f5ffc86bc170bdbef  $RUNNER_TEMP/xcodegen.zip" \
            | shasum -a 256 --check
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Generate project
        run: ./generate.sh

      - name: Build ${{ matrix.scheme }} (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project OpenSidecar.xcodeproj \
            -scheme '${{ matrix.scheme }}' \
            -configuration Debug \
            -destination '${{ matrix.destination }}' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
