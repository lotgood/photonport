name: Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "docs/privacy.html"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Published PhotonPort release tag"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Assemble static site
        run: |
          mkdir public
          cp docs/privacy.html public/privacy.html

      - name: Add Sparkle appcast
        if: env.RELEASE_TAG != ''
        run: |
          curl --fail --location --retry 3 \
            --output public/appcast.xml \
            "https://github.com/lotgood/photonport/releases/download/${RELEASE_TAG}/appcast.xml"

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
